name: Portability Smoke Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl,mbstring,dom,libxml,xml,xmlwriter
          coverage: none
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: App boots
        run: php spotify list

      - name: Test suite passes
        run: vendor/bin/pest --no-coverage

      - name: Static analysis passes
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: PHAR builds
        run: php spotify app:build spotify --build-version=smoke-${{ github.sha }}
        env:
          APP_ENV: production

      - name: PHAR binary boots
        run: ./builds/spotify list
